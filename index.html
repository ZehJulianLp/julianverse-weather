<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julianverse Weather</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f5f2;
            --panel: #ffffff;
            --text: #171717;
            --muted: #666666;
            --line: #deded8;
            --accent: #245f73;
            --accent-dark: #164555;
            --danger: #8f2f2f;
            --shadow: 0 18px 45px rgba(23, 23, 23, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
        }

        main {
            width: min(960px, calc(100% - 32px));
            margin: 0 auto;
            padding: 48px 0;
        }

        .hero {
            display: grid;
            gap: 12px;
            margin-bottom: 28px;
        }

        .eyebrow {
            margin: 0;
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 8vw, 5rem);
            line-height: 0.95;
            letter-spacing: -0.07em;
        }

        .hero p {
            max-width: 580px;
            margin: 0;
            color: var(--muted);
            font-size: 1.05rem;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .search {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        label {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        input,
        button {
            min-height: 48px;
            border-radius: 999px;
            font: inherit;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            padding: 0 18px;
            background: #fbfbf8;
            color: var(--text);
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(36, 95, 115, 0.12);
        }

        button {
            border: 0;
            padding: 0 18px;
            background: var(--accent);
            color: #ffffff;
            cursor: pointer;
            font-weight: 700;
        }

        button:hover {
            background: var(--accent-dark);
        }

        button.secondary {
            border: 1px solid var(--line);
            background: #ffffff;
            color: var(--text);
        }

        button.secondary:hover {
            background: #f0f0ea;
        }

        button:disabled {
            cursor: wait;
            opacity: 0.68;
        }

        .status {
            min-height: 28px;
            margin: 0 0 16px;
            color: var(--muted);
        }

        .status.error {
            color: var(--danger);
        }

        .weather {
            display: grid;
            gap: 20px;
        }

        .current {
            display: grid;
            grid-template-columns: minmax(0, 1.3fr) minmax(220px, 0.7fr);
            gap: 18px;
            padding: 24px;
        }

        .place {
            margin: 0 0 8px;
            color: var(--muted);
            font-size: 1rem;
        }

        .temperature {
            margin: 0;
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.08em;
        }

        .summary {
            margin: 14px 0 0;
            font-size: 1.2rem;
        }

        .meta {
            display: grid;
            gap: 10px;
            align-content: center;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
        }

        .meta-item:last-child {
            border-bottom: 0;
        }

        .meta-item span {
            color: var(--muted);
        }

        .meta-item strong {
            text-align: right;
        }

        .forecast {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .day {
            padding: 16px;
        }

        .day h2 {
            margin: 0 0 10px;
            font-size: 0.95rem;
        }

        .day p {
            margin: 0;
            color: var(--muted);
        }

        .day strong {
            display: block;
            margin: 12px 0 2px;
            font-size: 1.3rem;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 760px) {
            main {
                width: min(100% - 20px, 960px);
                padding: 28px 0;
            }

            .search,
            .current {
                grid-template-columns: 1fr;
            }

            .forecast {
                grid-template-columns: 1fr;
            }

            button,
            input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="hero" aria-labelledby="page-title">
            <p class="eyebrow">Open-Meteo forecast</p>
            <h1 id="page-title">Julianverse Weather</h1>
            <p>Search a city or use your current location to get a simple weather snapshot without tracking or API keys.</p>
        </section>

        <form class="panel search" id="search-form">
            <label for="location-input">Location</label>
            <input id="location-input" name="location" type="search" placeholder="Search city, e.g. Berlin" autocomplete="off" value="Berlin">
            <button type="submit">Search</button>
            <button class="secondary" type="button" id="location-button">Use my location</button>
        </form>

        <p class="status" id="status" role="status" aria-live="polite">Ready.</p>

        <section class="weather hidden" id="weather" aria-label="Weather results">
            <article class="panel current">
                <div>
                    <p class="place" id="place">-</p>
                    <p class="temperature" id="temperature">--&deg;</p>
                    <p class="summary" id="summary">-</p>
                </div>
                <div class="meta" aria-label="Current weather details">
                    <div class="meta-item">
                        <span>Wind</span>
                        <strong id="wind">-</strong>
                    </div>
                    <div class="meta-item">
                        <span>Humidity</span>
                        <strong id="humidity">-</strong>
                    </div>
                    <div class="meta-item">
                        <span>Updated</span>
                        <strong id="updated">-</strong>
                    </div>
                </div>
            </article>

            <div class="forecast" id="forecast" aria-label="Five day forecast"></div>
        </section>
    </main>

    <script>
        const searchForm = document.querySelector("#search-form");
        const locationInput = document.querySelector("#location-input");
        const locationButton = document.querySelector("#location-button");
        const statusElement = document.querySelector("#status");
        const weatherElement = document.querySelector("#weather");
        const placeElement = document.querySelector("#place");
        const temperatureElement = document.querySelector("#temperature");
        const summaryElement = document.querySelector("#summary");
        const windElement = document.querySelector("#wind");
        const humidityElement = document.querySelector("#humidity");
        const updatedElement = document.querySelector("#updated");
        const forecastElement = document.querySelector("#forecast");

        const weatherCodes = {
            0: "Clear sky",
            1: "Mainly clear",
            2: "Partly cloudy",
            3: "Overcast",
            45: "Fog",
            48: "Depositing rime fog",
            51: "Light drizzle",
            53: "Drizzle",
            55: "Dense drizzle",
            61: "Light rain",
            63: "Rain",
            65: "Heavy rain",
            71: "Light snow",
            73: "Snow",
            75: "Heavy snow",
            80: "Light showers",
            81: "Showers",
            82: "Heavy showers",
            95: "Thunderstorm",
            96: "Thunderstorm with hail",
            99: "Severe thunderstorm with hail"
        };

        const setLoading = (isLoading) => {
            searchForm.querySelectorAll("button, input").forEach((element) => {
                element.disabled = isLoading;
            });
        };

        const setStatus = (message, isError = false) => {
            statusElement.textContent = message;
            statusElement.classList.toggle("error", isError);
        };

        const formatDate = (value, options) => new Intl.DateTimeFormat("en", options).format(new Date(value));

        const getWeatherLabel = (code) => weatherCodes[code] || "Mixed weather";

        async function fetchJson(url) {
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error("The weather service is currently unavailable.");
            }

            return response.json();
        }

        async function findLocation(query) {
            const url = new URL("https://geocoding-api.open-meteo.com/v1/search");
            url.searchParams.set("name", query);
            url.searchParams.set("count", "1");
            url.searchParams.set("language", "en");
            url.searchParams.set("format", "json");

            const data = await fetchJson(url);

            if (!data.results || data.results.length === 0) {
                throw new Error("No matching location found.");
            }

            const [result] = data.results;

            return {
                name: [result.name, result.admin1, result.country].filter(Boolean).join(", "),
                latitude: result.latitude,
                longitude: result.longitude,
                timezone: result.timezone || "auto"
            };
        }

        async function fetchWeather(location) {
            const url = new URL("https://api.open-meteo.com/v1/forecast");
            url.searchParams.set("latitude", location.latitude);
            url.searchParams.set("longitude", location.longitude);
            url.searchParams.set("timezone", location.timezone);
            url.searchParams.set("current", "temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m");
            url.searchParams.set("daily", "weather_code,temperature_2m_max,temperature_2m_min");
            url.searchParams.set("forecast_days", "5");

            return fetchJson(url);
        }

        function renderWeather(location, data) {
            const current = data.current;
            const daily = data.daily;

            placeElement.textContent = location.name;
            temperatureElement.innerHTML = `${Math.round(current.temperature_2m)}&deg;`;
            summaryElement.textContent = getWeatherLabel(current.weather_code);
            windElement.textContent = `${Math.round(current.wind_speed_10m)} km/h`;
            humidityElement.textContent = `${current.relative_humidity_2m}%`;
            updatedElement.textContent = formatDate(current.time, {
                hour: "2-digit",
                minute: "2-digit"
            });

            forecastElement.innerHTML = daily.time.map((day, index) => `
                <article class="panel day">
                    <h2>${formatDate(day, { weekday: "short" })}</h2>
                    <p>${getWeatherLabel(daily.weather_code[index])}</p>
                    <strong>${Math.round(daily.temperature_2m_max[index])}&deg; / ${Math.round(daily.temperature_2m_min[index])}&deg;</strong>
                    <p>${formatDate(day, { month: "short", day: "numeric" })}</p>
                </article>
            `).join("");

            weatherElement.classList.remove("hidden");
        }

        async function loadLocation(location) {
            setLoading(true);
            setStatus(`Loading weather for ${location.name}...`);

            try {
                const data = await fetchWeather(location);
                renderWeather(location, data);
                setStatus("Forecast loaded.");
            } catch (error) {
                setStatus(error.message, true);
            } finally {
                setLoading(false);
            }
        }

        async function loadSearch(query) {
            setLoading(true);
            setStatus(`Searching for ${query}...`);

            try {
                const location = await findLocation(query);
                await loadLocation(location);
            } catch (error) {
                setStatus(error.message, true);
                setLoading(false);
            }
        }

        searchForm.addEventListener("submit", (event) => {
            event.preventDefault();
            const query = locationInput.value.trim();

            if (!query) {
                setStatus("Enter a location first.", true);
                return;
            }

            loadSearch(query);
        });

        locationButton.addEventListener("click", () => {
            if (!navigator.geolocation) {
                setStatus("Geolocation is not supported by this browser.", true);
                return;
            }

            setLoading(true);
            setStatus("Waiting for location permission...");

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    loadLocation({
                        name: "Your location",
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        timezone: "auto"
                    });
                },
                () => {
                    setLoading(false);
                    setStatus("Location permission was denied or unavailable.", true);
                },
                { enableHighAccuracy: false, timeout: 10000, maximumAge: 300000 }
            );
        });

        loadSearch(locationInput.value);
    </script>
</body>
</html>
